<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Drawer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-button">Dark Mode</button>
    </div>
    <div class="container">
        <h1>Lotto Drawer</h1>
        <div class="lotto-numbers">
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
            <span class="number"></span>
        </div>
        <button id="draw-button">Draw Numbers</button>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--text-color); opacity: 0.2;">

        <div class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="company" placeholder="Company Name" required>
                </div>
                <div class="form-group">
                    <input type="text" name="name" placeholder="Contact Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="How can we help?" rows="4" required></textarea>
                </div>
                <button type="submit" id="submit-button">Send Message</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
